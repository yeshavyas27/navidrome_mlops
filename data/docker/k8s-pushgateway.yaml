apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: navidrome-monitoring
  labels:
    app: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
      annotations:
        # Existing kubernetes-pods scrape job in prometheus-config picks
        # this up automatically — no Prometheus config edits needed.
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9091"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
      - name: pushgateway
        image: prom/pushgateway:v1.7.0
        args:
          # Persist pushed metrics across pod restarts so Prometheus
          # doesn't lose values during a Pushgateway redeploy.
          - --persistence.file=/data/pushgateway.tsdb
          - --persistence.interval=5m
        ports:
        - name: http
          containerPort: 9091
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9091
          initialDelaySeconds: 5
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9091
          initialDelaySeconds: 10
        resources:
          requests:
            memory: 64Mi
            cpu:    50m
          limits:
            memory: 256Mi
            cpu:    200m
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: navidrome-monitoring
  labels:
    app: pushgateway
spec:
  type: ClusterIP
  selector:
    app: pushgateway
  ports:
  - name: http
    port: 9091
    targetPort: 9091
