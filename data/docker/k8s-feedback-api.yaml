apiVersion: apps/v1
kind: Deployment
metadata:
  name: feedback-api-proj05
  namespace: navidrome-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feedback-api-proj05
  template:
    metadata:
      labels:
        app: feedback-api-proj05
    spec:
      containers:
      - name: feedback-api
        image: python:3.10-slim
        command: ["/bin/sh", "-c"]
        args:
          - "pip install fastapi uvicorn psycopg2-binary redis requests pandas pyarrow numpy python-swiftclient &&
             python /app/feedback_api.py"
        ports:
        - containerPort: 8000
        env:
        - name: PG_HOST
          value: "postgres.navidrome-platform.svc.cluster.local"
        - name: PG_DB
          value: "navidrome"
        - name: PG_USER
          value: "postgres"
        - name: PG_PASS
          value: "navidrome2026"
        - name: REDIS_HOST
          value: "redis.navidrome-platform.svc.cluster.local"
        - name: DATASET_VERSION
          value: "v20260418-001"
        - name: OS_AUTH_URL
          value: "https://chi.uc.chameleoncloud.org:5000/v3"
        - name: OS_APPLICATION_CREDENTIAL_ID
          value: "648ff7bbd6644376bae2177818acc3fb"
        - name: OS_APPLICATION_CREDENTIAL_SECRET
          value: "21CQ_fWzYJF-sY1OMzkNt8zWmNBAfyrv3QmNH0qh67PeS2EYw5YaW8blTBcZO7mq8Mg3l2CrgiEo86EJHVXxaQ"
        - name: FEEDBACK_API_URL
          value: "http://feedback-api-proj05.navidrome-platform.svc.cluster.local:8000"
        volumeMounts:
        - name: api-code
          mountPath: /app
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 30
      volumes:
      - name: api-code
        configMap:
          name: feedback-api-code-proj05
---
apiVersion: v1
kind: Service
metadata:
  name: feedback-api-proj05
  namespace: navidrome-platform
spec:
  selector:
    app: feedback-api-proj05
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    nodePort: 30800
  type: NodePort
